<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична 6: Модулі та ES6+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>Utility Library</h1>
            <p>ES6+ Модулі, Spread/Rest та Деструктуризація</p>
        </header>

        <section id="user-info">
            <h2>Дані з модуля data.js</h2>
            <output id="user-output">Завантаження даних...</output>
        </section>

        <section id="math-operations">
            <h2>Обчислення (utils.js)</h2>
            <div class="controls">
                <button id="calc-sum">Порахувати суму (Rest)</button>
                <button id="calc-mult">Помножити 5 x 10</button>
            </div>
            <output id="math-output">Результат з'явиться тут</output>
        </section>

        <section>
            <h3>Модульна архітектура</h3>
            
            <p><small>Використання <code>import</code> та <code>export</code> дозволяє створювати чистий та підтримуваний код.</small></p>
        </section>

        <footer>
            <a href="../index.html">← На головну</a>
        </footer>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
