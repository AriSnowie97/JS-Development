<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична 5: Асинхронність & API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>PokeDex Explorer</h1>
            <p>Робота з асинхронними запитами (Fetch API)</p>
        </header>

        <section id="controls">
            <input type="text" id="poke-name" placeholder="Введіть ім'я (напр. ditto)">
            <button id="fetch-btn">Знайти покемона</button>
            <button id="random-btn">Випадковий</button>
        </section>

        <section id="display-area">
            <p>Введіть назву покемона для пошуку...</p>
        </section>

        <section id="theory-block">
            <h3>Як працює Async/Await</h3>
            
            <p><small>Використання <code>try...catch</code> дозволяє обробляти помилки мережі без зупинки скрипта.</small></p>
        </section>

        <footer>
            <a href="../index.html">← На головну</a>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
