<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна 4-6: Фільмова База</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>MovieBase API</h1>
            <p>Досліджуйте світ кіно за допомогою TV Maze API</p>
        </header>

        <nav>
            <input type="text" id="search-input" placeholder="Пошук за назвою...">
            <select id="sort-select">
                <option value="default">Сортувати за...</option>
                <option value="name-asc">Назва (А-Я)</option>
                <option value="rating-desc">Рейтинг (Високий)</option>
            </select>
        </nav>

        <section id="movie-grid">
            <p>Завантаження фільмів...</p>
        </section>

        <footer id="status-bar">
            <a href="../index.html">← Повернутися до портфоліо</a>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
