<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтерактивна Анкета</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Інтерактивна Анкета</h1>
            <p>Натисніть кнопку нижче, щоб розпочати збір даних.</p>
        </header>

        <section class="controls">
            <button id="start-btn">Запустити анкету</button>
        </section>
        
        <section id="results" class="hidden">
            <h2>Результати обробки:</h2>
            <output id="output"></output>
        </section>

        <hr>

        <section class="info-block">
            <h3>Освітній блок</h3>
            <figure>
                <figcaption>Схема роботи Event Loop у JavaScript</figcaption>
                
            </figure>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
