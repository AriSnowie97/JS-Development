<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична 4: DOM & Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>To-Do List</h1>
            <p>Практика роботи з DOM та подіями</p>
        </header>

        <section>
            <form id="todo-form">
                <input type="text" id="task-input" placeholder="Що потрібно зробити?" aria-label="Нове завдання">
                <button type="submit">Додати</button>
            </form>
        </section>

        <section>
            <ul id="task-list">
                </ul>
        </section>

        <section id="dom-info">
            <h3>Структура DOM та Події</h3>
            
            <p><small>Тут застосовано <strong>делегування подій</strong>: один слухач на весь список <code>ul</code>.</small></p>
        </section>

        <footer>
            <a href="../index.html">← На головну</a>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
